<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>3do</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main id="auth-view" class="auth-screen hidden" aria-live="polite">
      <section class="auth-card" id="login-panel">
        <div class="brand-mark">3do</div>
        <h1>Workshop access</h1>
        <p>Sign in to run the print queue.</p>
        <form id="login-form">
          <label>
            Email
            <input name="email" type="email" required autocomplete="email">
          </label>
          <label>
            Password
            <input name="password" type="password" required autocomplete="current-password">
          </label>
          <button type="submit">Sign in</button>
          <p id="login-status" class="form-status"></p>
        </form>
      </section>

      <section class="auth-card hidden" id="bootstrap-panel">
        <div class="brand-mark">3do</div>
        <h1>Create admin</h1>
        <p>Initialize the first workshop operator account.</p>
        <form id="bootstrap-form">
          <label>
            Display name
            <input name="display_name" required autocomplete="name">
          </label>
          <label>
            Email
            <input name="email" type="email" required autocomplete="email">
          </label>
          <label>
            Password
            <input name="password" type="password" required minlength="12" autocomplete="new-password">
          </label>
          <button type="submit">Create admin</button>
          <p id="bootstrap-status" class="form-status"></p>
        </form>
      </section>
    </main>

    <main id="app-view" class="app-shell hidden">
      <aside class="sidebar">
        <a class="sidebar-brand" href="#dashboard" aria-label="3do dashboard">
          <span class="brand-mark">3do</span>
          <span>Print control</span>
        </a>
        <nav id="route-nav" class="route-nav" aria-label="Primary"></nav>
        <div id="session-area" class="session-area"></div>
      </aside>
      <section class="workspace">
        <header id="route-header" class="route-header"></header>
        <section id="route-view" class="route-view" aria-live="polite"></section>
      </section>
    </main>

    <script src="/static/app.js" type="module"></script>
  </body>
</html>
