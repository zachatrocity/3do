<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>3do</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>3do</h1>
        <p>Self-hosted 3D print queue</p>
      </div>
      <div id="session-area" class="session-area"></div>
    </header>

    <main id="auth-view" class="auth-layout hidden">
      <section class="panel auth-panel" id="login-panel">
        <h2>Sign in</h2>
        <form id="login-form">
          <label>
            Email
            <input name="email" type="email" required autocomplete="email">
          </label>
          <label>
            Password
            <input name="password" type="password" required autocomplete="current-password">
          </label>
          <button type="submit">Sign in</button>
          <p id="login-status" class="form-status"></p>
        </form>
      </section>

      <section class="panel auth-panel hidden" id="bootstrap-panel">
        <h2>Create admin</h2>
        <form id="bootstrap-form">
          <label>
            Display name
            <input name="display_name" required autocomplete="name">
          </label>
          <label>
            Email
            <input name="email" type="email" required autocomplete="email">
          </label>
          <label>
            Password
            <input name="password" type="password" required minlength="12" autocomplete="new-password">
          </label>
          <button type="submit">Create admin</button>
          <p id="bootstrap-status" class="form-status"></p>
        </form>
      </section>
    </main>

    <main id="app-view" class="layout hidden">
      <section class="panel create-panel">
        <h2>Add print</h2>
        <form id="item-form">
          <label>
            Title
            <input name="title" required placeholder="Gridfinity bins">
          </label>
          <label>
            Links
            <textarea name="links" rows="3" placeholder="https://www.printables.com/..."></textarea>
          </label>
          <div class="grid">
            <label>
              Status
              <select name="status">
                <option value="backlog">Backlog</option>
                <option value="queued">Queued</option>
                <option value="printing">Printing</option>
                <option value="blocked">Blocked</option>
              </select>
            </label>
            <label>
              Priority
              <select name="priority">
                <option value="normal">Normal</option>
                <option value="low">Low</option>
                <option value="high">High</option>
                <option value="urgent">Urgent</option>
              </select>
            </label>
          </div>
          <div class="grid">
            <label>
              Requested by
              <input name="requested_by" placeholder="Zach">
            </label>
            <label>
              Owner
              <input name="owner" placeholder="Shop">
            </label>
          </div>
          <div class="grid">
            <label>
              Material
              <input name="material" placeholder="PLA">
            </label>
            <label>
              Color
              <input name="color" placeholder="Black">
            </label>
          </div>
          <div class="grid">
            <label>
              Quantity
              <input name="quantity" type="number" min="1" value="1">
            </label>
            <label>
              Printing by
              <input name="printing_by" placeholder="A1 Mini">
            </label>
          </div>
          <div class="grid">
            <label>
              Due date
              <input name="due_at" type="date">
            </label>
            <label>
              Estimate
              <input name="estimated_minutes" type="number" min="1" placeholder="90">
            </label>
          </div>
          <label>
            Files
            <input name="files" type="file" multiple accept=".stl,.3mf,.gcode,.step,.stp,.obj,.zip,.png,.jpg,.jpeg,.webp">
          </label>
          <label>
            Notes
            <textarea name="description" rows="3"></textarea>
          </label>
          <button type="submit">Add to queue</button>
          <p id="form-status" class="form-status"></p>
        </form>
      </section>

      <section class="panel queue-panel">
        <div class="section-head">
          <h2>Queue</h2>
          <div class="toolbar">
            <select id="status-filter" aria-label="Filter by status">
              <option value="">All statuses</option>
              <option value="backlog">Backlog</option>
              <option value="queued">Queued</option>
              <option value="printing">Printing</option>
              <option value="blocked">Blocked</option>
              <option value="done">Done</option>
              <option value="cancelled">Cancelled</option>
            </select>
            <button id="refresh" type="button">Refresh</button>
          </div>
        </div>
        <div id="queue" class="queue"></div>
      </section>

      <section class="panel detail-panel">
        <div class="section-head">
          <h2>Detail</h2>
          <button id="close-detail" class="secondary hidden" type="button">Close</button>
        </div>
        <div id="item-detail" class="detail-empty">
          <p class="muted">Select a queue item.</p>
        </div>
      </section>

      <section class="panel printer-panel">
        <h2>Printers</h2>
        <form id="printer-form" class="inline-form">
          <input name="name" required placeholder="Prusa MK4">
          <input name="location" placeholder="Garage">
          <button type="submit">Add</button>
        </form>
        <div id="printers" class="printers"></div>
      </section>

      <section class="panel users-panel hidden" id="users-panel">
        <h2>Users</h2>
        <form id="user-form" class="user-create-form">
          <input name="display_name" required placeholder="Display name">
          <input name="email" type="email" required placeholder="email@example.com">
          <input name="password" type="password" required minlength="12" placeholder="Temporary password">
          <select name="role">
            <option value="member">Member</option>
            <option value="admin">Admin</option>
          </select>
          <label class="checkbox-label">
            <input name="active" type="checkbox" checked>
            Active
          </label>
          <button type="submit">Add user</button>
        </form>
        <p id="user-status" class="form-status"></p>
        <div id="users" class="users"></div>
      </section>
    </main>

    <script src="/static/app.js" type="module"></script>
  </body>
</html>
