services:
  3do:
    build: .
    image: 3do:local
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "/app/3do", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
